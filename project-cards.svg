      <text x="25" y="13" text-anchor="middle" fill="#58a6ff" font-family="'SF Mono','Fira Code',monospace" font-size="8">Django</text>
      <rect x="55" y="0" width="35" height="18" rx="3" fill="#1f3d5e" opacity="0.6"/>
      <text x="72" y="13" text-anchor="middle" fill="#58a6ff" font-family="'SF Mono','Fira Code',monospace" font-size="8">K8s</text>
      <rect x="95" y="0" width="60" height="18" rx="3" fill="#1f3d5e" opacity="0.6"/>
      <text x="125" y="13" text-anchor="middle" fill="#58a6ff" font-family="'SF Mono','Fira Code',monospace" font-size="8">Jenkins</text>
      <rect x="0" y="24" width="55" height="18" rx="3" fill="#1f3d5e" opacity="0.6"/>
      <text x="27" y="37" text-anchor="middle" fill="#58a6ff" font-family="'SF Mono','Fira Code',monospace" font-size="8">ArgoCD</text>
