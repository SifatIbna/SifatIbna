      <text x="440" y="17" text-anchor="middle" fill="#ffa657" font-family="'SF Mono','Fira Code',monospace" font-size="7">MicroK8s HA</text>
      <text x="440" y="28" text-anchor="middle" fill="#8b949e" font-family="'SF Mono','Fira Code',monospace" font-size="7">3-node cluster</text>
      
      <!-- Arrow -->
