<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" width="900" height="620">
  <defs>
    <radialGradient id="cardBg" cx="50%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#0f1729"/>
      <stop offset="100%" stop-color="#060a13"/>
    </radialGradient>
    <linearGradient id="card1Border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f6feb"/>
      <stop offset="100%" stop-color="#58a6ff"/>
    </linearGradient>
    <linearGradient id="card2Border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3fb950"/>
      <stop offset="100%" stop-color="#7ee787"/>
    </linearGradient>
    <linearGradient id="card3Border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d29922"/>
      <stop offset="100%" stop-color="#ffa657"/>
    </linearGradient>
    <linearGradient id="flowLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </linearGradient>
    <filter id="cardGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <style>
      @keyframes fadeIn1 { 0%{opacity:0;transform:translateY(20px)}100%{opacity:1;transform:translateY(0)} }
      @keyframes fadeIn2 { 0%{opacity:0;transform:translateY(20px)}100%{opacity:1;transform:translateY(0)} }
      @keyframes fadeIn3 { 0%{opacity:0;transform:translateY(20px)}100%{opacity:1;transform:translateY(0)} }
      @keyframes dataFlow {
        0% { stroke-dashoffset: 20; }
        100% { stroke-dashoffset: 0; }
      }
      @keyframes nodePulse {
        0%,100% { r: 4; opacity: 0.8; }
        50% { r: 5.5; opacity: 1; }
      }
      .card1 { animation: fadeIn1 0.6s ease-out 0.2s both; }
      .card2 { animation: fadeIn2 0.6s ease-out 0.5s both; }
      .card3 { animation: fadeIn3 0.6s ease-out 0.8s both; }
      .data-flow { stroke-dasharray: 4 4; animation: dataFlow 1s linear infinite; }
      .node-pulse { animation: nodePulse 2s ease-in-out infinite; }
    </style>
  </defs>

  <!-- === CARD 1: netlearning.co.jp === -->
  <g class="card1" filter="url(#softShadow)">
    <rect x="20" y="10" width="860" height="180" rx="8" fill="#0d1117" stroke="url(#card1Border)" stroke-width="1"/>
    
    <!-- Status indicator -->
    <circle cx="42" cy="32" r="4" fill="#3fb950"/>
    <text x="54" y="36" fill="#3fb950" font-family="'SF Mono','Fira Code',monospace" font-size="10">PRODUCTION</text>
    
    <!-- Title -->
