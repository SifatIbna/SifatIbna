      <rect x="530" y="5" width="80" height="28" rx="4" fill="#161b22" stroke="#f85149" stroke-width="0.8"/>
      <text x="570" y="23" text-anchor="middle" fill="#ff7b72" font-family="'SF Mono','Fira Code',monospace" font-size="8">PostgreSQL</text>

      <!-- Node dots -->
      <circle cx="75" cy="19" r="3" fill="#58a6ff" class="node-pulse"/>
      <circle cx="115" cy="19" r="3" fill="#58a6ff" class="node-pulse" style="animation-delay:0.3s"/>
      <circle cx="240" cy="19" r="3" fill="#3fb950" class="node-pulse" style="animation-delay:0.6s"/>
      <circle cx="395" cy="19" r="3" fill="#d29922" class="node-pulse" style="animation-delay:0.9s"/>
      <circle cx="530" cy="19" r="3" fill="#f85149" class="node-pulse" style="animation-delay:1.2s"/>
    </g>
    
